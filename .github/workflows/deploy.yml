name: Deploy VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Backup
        continue-on-error: true
        run: |
          mkdir -p /var/www/InvestAI/backups
          tar -czf /var/www/InvestAI/backups/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
              -C /var/www/InvestAI investai/ 2>/dev/null || true
          ls -t /var/www/InvestAI/backups/backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -- || true

      - name: Atualizar codigo
        run: |
          cd /var/www/InvestAI
          [ -f "investai/js/config.js" ] && cp investai/js/config.js /tmp/investai_config.bak || true
          git config --global --add safe.directory /var/www/InvestAI

          # Remove objetos git corrompidos (arquivos vazios causados por fetch interrompido)
          EMPTY=$(find .git/objects -size 0 2>/dev/null | wc -l)
          if [ "$EMPTY" -gt 0 ]; then
            echo "Removendo $EMPTY objeto(s) git corrompido(s)..."
            find .git/objects -size 0 -delete 2>/dev/null || true
          fi

          git fetch origin main
          git reset --hard origin/main
          [ -f "/tmp/investai_config.bak" ] && cp /tmp/investai_config.bak investai/js/config.js || true
          echo "Commit: $(git log -1 --format='%h %s')"

      - name: Atualizar env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
        run: |
          ENV_FILE="/var/www/InvestAI/api/.env"
          TMP_ENV="/tmp/investai_env.$$"
          [ -f "$ENV_FILE" ] && grep -v "^ANTHROPIC_API_KEY=\|^MP_ACCESS_TOKEN=\|^PORT=" "$ENV_FILE" > "$TMP_ENV" 2>/dev/null || true
          [ -n "$ANTHROPIC_API_KEY" ] && echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$TMP_ENV"
          [ -n "$MP_ACCESS_TOKEN"   ] && echo "MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}"     >> "$TMP_ENV"
          grep -q "^PORT=" "$TMP_ENV" 2>/dev/null || echo "PORT=3001" >> "$TMP_ENV"
          cp "$TMP_ENV" "$ENV_FILE" && chmod 600 "$ENV_FILE"
          rm -f "$TMP_ENV"
          echo ".env atualizado"

      - name: Instalar dependencias
        run: |
          cd /var/www/InvestAI/api
          # Evita recompilar better-sqlite3 (modulo nativo) em cada push.
          # So instala se package.json ou package-lock.json mudaram.
          HASH_NOW=$(md5sum package.json package-lock.json 2>/dev/null | md5sum | cut -d' ' -f1)
          HASH_FILE="/var/www/InvestAI/.pkg_hash"
          HASH_OLD=$(cat "$HASH_FILE" 2>/dev/null || echo "")
          if [ "$HASH_NOW" != "$HASH_OLD" ]; then
            echo "Dependencias mudaram — instalando..."
            npm install --production --prefer-offline 2>&1 | tail -5
            echo "$HASH_NOW" > "$HASH_FILE"
          else
            echo "Dependencias sem alteracao — pulando npm install"
          fi

      - name: Reiniciar API
        run: |
          cd /var/www/InvestAI/api
          mkdir -p /var/www/InvestAI/logs

          if pm2 describe investai-api > /dev/null 2>&1; then
            pm2 restart investai-api --update-env
          else
            pm2 start ecosystem.config.js
            pm2 save --force
          fi

          # Aguarda API responder (ate 20s)
          echo "Aguardando API iniciar..."
          for i in $(seq 1 20); do
            if curl -sf --max-time 2 http://127.0.0.1:3001/api/health > /dev/null 2>&1; then
              echo "API online em ${i}s"
              break
            fi
            sleep 1
          done

          STATUS=$(curl -sf --max-time 3 http://127.0.0.1:3001/api/health 2>/dev/null || echo '{"status":"offline"}')
          echo "Health: $STATUS"

      - name: Verificar banco de dados
        run: |
          cd /var/www/InvestAI/api
          node -e "try { const db = require('./db'); db.getUserByEmail('x@x.com'); console.log('DB OK — SQLite'); } catch(e) { console.error('DB ERRO:', e.message); process.exit(1); }"

      - name: Configurar nginx
        run: |
          bash /var/www/InvestAI/api/setup-nginx.sh
          echo "=== nginx-setup.log ==="
          tail -40 /var/www/InvestAI/nginx-setup.log 2>/dev/null || echo "(log nao encontrado)"
          nginx -t

      - name: Validar proxy nginx InvestAI
        run: |
          echo "Validando proxy nginx local..."
          HEALTH=$(curl -sS --max-time 5 -o /tmp/investai_health.out -w '%{http_code}' http://127.0.0.1/investai/api/health || true)
          echo "HTTP /investai/api/health: $HEALTH"
          cat /tmp/investai_health.out || true
          if [ "$HEALTH" != "200" ]; then
            echo "ERRO: nginx nao esta encaminhando /investai/api/health para a API"
            exit 1
          fi

          AUTH=$(curl -sS --max-time 5 -o /tmp/investai_auth.out -w '%{http_code}' \
            -X POST http://127.0.0.1/investai/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"deploy-probe@investai.local","password":"123456"}' || true)
          echo "HTTP /investai/api/auth/login: $AUTH"
          cat /tmp/investai_auth.out || true
          if [ "$AUTH" != "401" ] && [ "$AUTH" != "200" ]; then
            echo "ERRO: nginx nao esta encaminhando /investai/api/auth/login para a API"
            exit 1
          fi

      - name: Verificar deploy
        run: |
          echo "=== Deploy concluido: $(date) ==="
          echo "Commit: $(cd /var/www/InvestAI && git log -1 --format='%h %s' 2>/dev/null)"
          pm2 list 2>/dev/null | grep -E "investai|name" || true

          # Verifica DB (SQLite vs in-memory mock)
          DB_STATUS=$(cd /var/www/InvestAI/api && node -e "
            try { require('./db'); console.log('SQLite'); }
            catch(e) { console.log('mock:' + e.message.slice(0,40)); }
          " 2>/dev/null || echo 'erro')
          echo "Banco de dados: $DB_STATUS"

          # Verifica proxy nginx
          HTTP=$(curl -sf --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1/investai/api/health 2>/dev/null || echo 'erro')
          echo "Proxy nginx local /investai/api/health: HTTP $HTTP"
          test "$HTTP" = "200"
