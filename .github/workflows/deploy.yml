name: Deploy VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-wnrinvestai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Preservar arquivos locais antes do checkout
        run: |
          set -e
          SRC="$GITHUB_WORKSPACE/source"
          BAK="$RUNNER_TEMP/wnrinvestai-preserve"

          rm -rf "$BAK"
          mkdir -p "$BAK"

          [ -f "$SRC/.env" ] && cp "$SRC/.env" "$BAK/root.env" || true
          [ -f "$SRC/api/.env" ] && cp "$SRC/api/.env" "$BAK/api.env" || true
          [ -f "$SRC/investai/js/config.js" ] && cp "$SRC/investai/js/config.js" "$BAK/config.js" || true

      - uses: actions/checkout@v4
        with:
          path: source
          clean: true

      - name: Restaurar arquivos locais apos checkout
        run: |
          set -e
          SRC="$GITHUB_WORKSPACE/source"
          BAK="$RUNNER_TEMP/wnrinvestai-preserve"

          [ -f "$BAK/root.env" ] && cp "$BAK/root.env" "$SRC/.env" || true
          [ -f "$BAK/api.env" ] && cp "$BAK/api.env" "$SRC/api/.env" || true
          [ -f "$BAK/config.js" ] && cp "$BAK/config.js" "$SRC/investai/js/config.js" || true

      - name: Deploy
        env:
          APP_SOURCE: ${{ github.workspace }}/source
          APP_DIR: /var/www/wnrinvestai
          APP_PREFIX: /wnrinvestai
          APP_HOST: wnrtecnologia.com.br
          API_PORT: "3001"
          APP_NAME: investai-api
          NODE_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: bash "${{ github.workspace }}/source/deploy.sh"

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wnrinvestai-deploy-diagnostics
          path: |
            /var/www/wnrinvestai/investai/deploy-status.json
            /var/www/wnrinvestai/investai/deploy-progress.txt
            /var/www/wnrinvestai/logs/deploy.log
          if-no-files-found: ignore
