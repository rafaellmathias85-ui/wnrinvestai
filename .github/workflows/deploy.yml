name: Deploy VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Backup
        continue-on-error: true
        run: |
          mkdir -p /var/www/InvestAI/backups
          tar -czf /var/www/InvestAI/backups/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
              -C /var/www/InvestAI investai/
          ls -t /var/www/InvestAI/backups/backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm --

      - name: Deploy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
        run: |
          cd /var/www/InvestAI

          # Preservar config.js local (não versionado)
          [ -f "investai/js/config.js" ] && cp investai/js/config.js /tmp/investai_config.bak

          git config --global --add safe.directory /var/www/InvestAI
          git fetch origin main
          git reset --hard origin/main

          [ -f "/tmp/investai_config.bak" ] && cp /tmp/investai_config.bak investai/js/config.js

          # Atualizar .env (preserva variáveis SMTP e outras locais)
          ENV_FILE="/var/www/InvestAI/api/.env"
          TMP_ENV="/tmp/investai_env.$$"
          [ -f "$ENV_FILE" ] && grep -v "^ANTHROPIC_API_KEY=\|^MP_ACCESS_TOKEN=\|^PORT=" "$ENV_FILE" > "$TMP_ENV" 2>/dev/null || true
          [ -n "$ANTHROPIC_API_KEY" ] && echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$TMP_ENV"
          [ -n "$MP_ACCESS_TOKEN"   ] && echo "MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}"     >> "$TMP_ENV"
          grep -q "^PORT=" "$TMP_ENV" 2>/dev/null || echo "PORT=3001" >> "$TMP_ENV"
          cp "$TMP_ENV" "$ENV_FILE" && chmod 600 "$ENV_FILE" && echo ".env atualizado"
          rm -f "$TMP_ENV"

          # Instalar dependências
          cd /var/www/InvestAI/api
          npm install --production
          npm audit --audit-level=high --production 2>&1 | head -20 || true

          # Reiniciar servidor com PM2
          if pm2 describe investai-api > /dev/null 2>&1; then
            pm2 restart investai-api --update-env
          else
            pm2 start server.js --name investai-api
          fi

          # Garantir startup automático no boot do servidor
          pm2 save --force
          pm2 startup 2>/dev/null | tail -1 | bash 2>/dev/null || true

          echo "Deploy concluido em $(date)"

      - name: Configurar nginx
        continue-on-error: true
        run: bash /var/www/InvestAI/api/setup-nginx.sh
