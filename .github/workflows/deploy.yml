name: Deploy VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Backup estado atual do InvestAI
        continue-on-error: true
        run: |
          mkdir -p /var/www/InvestAI/backups
          tar -czf /var/www/InvestAI/backups/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
              -C /var/www/InvestAI investai/
          # Mantém apenas os 5 backups mais recentes
          ls -t /var/www/InvestAI/backups/backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm --
          echo "Backup criado em /var/www/InvestAI/backups/"

      - name: Deploy InvestAI on VPS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
        run: |
          cd /var/www/InvestAI

          # Preservar config.js (contém chave da API, não está no git)
          if [ -f "investai/js/config.js" ]; then
            cp investai/js/config.js /tmp/investai_config.backup.js
          fi

          git config --global --add safe.directory /var/www/InvestAI
          git fetch origin main
          git reset --hard origin/main

          # Restaurar config.js após o reset
          if [ -f "/tmp/investai_config.backup.js" ]; then
            cp /tmp/investai_config.backup.js investai/js/config.js
          fi

          # ── Atualizar variáveis de ambiente ───────────────────────
          # Escreve num arquivo temporário (sempre acessível) e substitui
          # o .env de forma atômica; contorna problemas de ownership no
          # arquivo original criado por root durante o setup inicial do VPS.
          ENV_FILE="/var/www/InvestAI/api/.env"
          TMP_ENV="/tmp/investai_env.$$"

          # Preserva variáveis existentes que não vêm dos secrets
          if [ -f "$ENV_FILE" ]; then
            grep -v "^ANTHROPIC_API_KEY=\|^MP_ACCESS_TOKEN=\|^PORT=" "$ENV_FILE" > "$TMP_ENV" 2>/dev/null || true
          fi

          # Injeta secrets e porta padrão
          [ -n "$ANTHROPIC_API_KEY" ] && echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$TMP_ENV"
          [ -n "$MP_ACCESS_TOKEN"   ] && echo "MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}"     >> "$TMP_ENV"
          grep -q "^PORT=" "$TMP_ENV" 2>/dev/null || echo "PORT=3001" >> "$TMP_ENV"

          # Tenta substituir o .env; se falhar por permissão, mantém o anterior
          if cp "$TMP_ENV" "$ENV_FILE" 2>/dev/null; then
            chmod 600 "$ENV_FILE"
            echo ".env atualizado com secrets do GitHub"
          else
            echo "AVISO: sem permissao para sobrescrever $ENV_FILE — .env atual mantido"
            echo "Execute no VPS: sudo chown \$(id -un) $ENV_FILE"
          fi
          rm -f "$TMP_ENV"

          # ── Instalar dependências do backend ──────────────────────
          cd /var/www/InvestAI/api
          npm install --production
          # Auditoria de segurança — loga CVEs críticos sem bloquear o deploy
          npm audit --audit-level=high --production 2>&1 | head -30 || true

          # ── Reiniciar API com PM2 ─────────────────────────────────
          if pm2 describe investai-api > /dev/null 2>&1; then
            pm2 restart investai-api
          else
            pm2 start server.js --name investai-api
            pm2 save
          fi

          echo "Deploy InvestAI concluido em $(date)"
