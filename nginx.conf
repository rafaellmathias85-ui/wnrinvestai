# ============================================================
# Adicione estes blocos dentro do server block existente de
# wnrtecnologia.com.br no nginx do VPS.
#
# Arquivo típico: /etc/nginx/sites-available/wnrtecnologia.com.br
# ou:             /etc/nginx/conf.d/wnrtecnologia.conf
#
# ── SECURITY HEADERS ────────────────────────────────────────
# Adicione estas linhas DENTRO do bloco server { } principal
# (antes das diretivas location), para que sejam herdadas:
#
#   # Proteção HTTPS (HSTS — só ativa após TLS confirmado)
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#
#   # Bloqueia clickjacking (iframe embutido de outros domínios)
#   add_header X-Frame-Options "SAMEORIGIN" always;
#
#   # Bloqueia MIME-type sniffing
#   add_header X-Content-Type-Options "nosniff" always;
#
#   # Reduz vazamento de Referer entre origens
#   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#
#   # Desabilita recursos sensíveis desnecessários
#   add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
#
#   # Content Security Policy (ajuste os domínios conforme necessário)
#   add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://api.coingecko.com https://brapi.dev https://economia.awesomeapi.com.br https://api.bcb.gov.br https://query1.finance.yahoo.com https://query2.finance.yahoo.com; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
#
# ============================================================

    # API backend do InvestAI sob o mesmo prefixo do frontend.
    # Deve vir antes de location /investai/ para nao ser tratado como arquivo estatico.
    location /investai/api/auth/ {
        proxy_pass http://127.0.0.1:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64k;
    }

    location /investai/api/health   { proxy_pass http://127.0.0.1:3001/api/health;   }
    location /investai/api/plan     { proxy_pass http://127.0.0.1:3001/api/plan;     }
    location /investai/api/ai       { proxy_pass http://127.0.0.1:3001/api/ai;       }
    location /investai/api/checkout { proxy_pass http://127.0.0.1:3001/api/checkout; }
    location /investai/api/webhook  { proxy_pass http://127.0.0.1:3001/api/webhook;  }
    location /investai/api/b3quote  { proxy_pass http://127.0.0.1:3001/api/b3quote;  }

    # Landing page do InvestAI
    location = /investai {
        alias /var/www/InvestAI/investai;
        try_files /landing.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # App principal
    location = /investai/app {
        alias /var/www/InvestAI/investai;
        try_files /index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Todos os arquivos estáticos do InvestAI
    location /investai/ {
        alias /var/www/InvestAI/investai/;
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Cache para assets estáticos do InvestAI
    location ~* ^/investai/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        alias /var/www/InvestAI/investai/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Sem cache para HTML do InvestAI
    location ~* ^/investai/.+\.html$ {
        alias /var/www/InvestAI/investai/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # API backend (Node.js / PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
        # Limita tamanho do corpo (evita floods no webhook/checkout)
        client_max_body_size 64k;
    }
