# Adicione este bloco location dentro do server block existente de wnrtecnologia.com.br
# Arquivo: /etc/nginx/sites-available/wnrtecnologia.com.br (ou similar)

location /investai {
    alias /var/www/wnrtecnologia/investai/investai;
    index landing.html;

    # Landing page como homepage do /investai
    location = /investai {
        alias /var/www/wnrtecnologia/investai/investai;
        try_files /landing.html =404;
    }

    # App principal em /investai/app
    location = /investai/app {
        alias /var/www/wnrtecnologia/investai/investai;
        try_files /index.html =404;
    }

    # Cache para assets estáticos
    location ~* ^/investai/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        alias /var/www/wnrtecnologia/investai/investai;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Sem cache para HTML
    location ~* ^/investai/.+\.html$ {
        alias /var/www/wnrtecnologia/investai/investai;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
