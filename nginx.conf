# ============================================================
# Adicione estes blocos dentro do server block existente de
# wnrtecnologia.com.br no nginx do VPS.
#
# Arquivo típico: /etc/nginx/sites-available/wnrtecnologia.com.br
# ou:             /etc/nginx/conf.d/wnrtecnologia.conf
# ============================================================

    # Landing page do InvestAI
    location = /investai {
        alias /var/www/InvestAI/investai;
        try_files /landing.html =404;
    }

    # App principal
    location = /investai/app {
        alias /var/www/InvestAI/investai;
        try_files /index.html =404;
    }

    # Todos os arquivos estáticos do InvestAI
    location /investai/ {
        alias /var/www/InvestAI/investai/;
        try_files $uri $uri/ =404;
    }

    # Cache para assets estáticos do InvestAI
    location ~* ^/investai/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        alias /var/www/InvestAI/investai/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Sem cache para HTML do InvestAI
    location ~* ^/investai/.+\.html$ {
        alias /var/www/InvestAI/investai/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
